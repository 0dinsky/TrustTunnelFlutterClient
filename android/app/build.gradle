plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

allprojects {
    repositories {
        google()
        mavenCentral()
        mavenLocal()
    }
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null) {
    flutterVersionCode = "1"
}

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null) {
    flutterVersionName = "1.0"
}


def getSigningProp = { String name ->
    def v = project.findProperty(name)
    if (v != null) return v.toString()
    v = localProperties.getProperty(name)
    return v != null ? v.toString() : null
}

android {
    namespace = "com.adguard.trusttunnel"
    compileSdk = 36
    buildToolsVersion = "36.0.0"
    ndkVersion = "27.0.12077973"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.adguard.trusttunnel"
        // You can update the following values to match your application needs.
        // For more information, see: https://docs.flutter.dev/deployment/android#reviewing-the-gradle-build-configuration.
        minSdk = 26
        ndk {
            abiFilters "arm64-v8a"
        }
        targetSdk = 36
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName
    }

    signingConfigs {
        release {
            keyAlias = getSigningProp("signingConfigKeyAlias")
            keyPassword = getSigningProp("signingConfigKeyPassword")
            storeFile = rootProject.file(getSigningProp("signingConfigKeyStorePath"))
            storePassword = getSigningProp("signingConfigKeyStorePassword")
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
        }
    }

    // Оставить только arm64 — удалить .so других архитектур из AAR-зависимостей
    packaging {
        jniLibs {
            excludes += [
                "**/x86/**",
                "**/x86_64/**",
                "**/armeabi/**",
                "**/armeabi-v7a/**",
            ]
        }
    }
}

flutter {
    source = "../.."
}
