name: Build TrustTunnel APK

on:
  workflow_dispatch:  # запуск вручную кнопкой

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Получаем код
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Java 17
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # 3. Flutter 3.38.3 (точная версия из pubspec.yaml)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.3'
          channel: stable
          cache: true

      # 4. Декодируем keystore из секрета
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks

      # 5. Получаем зависимости
      #    GPR_KEY — GitHub Personal Access Token с правом read:packages
      - name: Flutter pub get
        env:
          GPR_KEY: ${{ secrets.GPR_KEY }}
        run: flutter pub get

      # 6. Сборка release APK
      - name: Build APK
        env:
          GPR_KEY: ${{ secrets.GPR_KEY }}
        run: |
          flutter build apk --release \
            --dart-define=BUILD_CHANNEL=Release \
            -P signingConfigKeyAlias=${{ secrets.KEY_ALIAS }} \
            -P signingConfigKeyPassword=${{ secrets.KEY_PASSWORD }} \
            -P signingConfigKeyStorePath=keystore.jks \
            -P signingConfigKeyStorePassword=${{ secrets.STORE_PASSWORD }}

      # 7. Выкладываем APK как артефакт (скачать 90 дней)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: trusttunnel-dark-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90

