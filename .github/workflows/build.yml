name: Build TrustTunnel APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: ""
          
      - name: Setup Android SDK components
        run: |
          sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.0.12077973"

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" \
            | tr -d '[:space:]' \
            | base64 -d > android/keystore.jks

      - name: Check GPR token access
        run: |
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            -u "x:${{ secrets.GPR_KEY }}" \
            "https://maven.pkg.github.com/TrustTunnel/TrustTunnelClient/com/adguard/trusttunnel/trusttunnel-client-android/maven-metadata.xml")
          echo "GitHub Packages HTTP: $HTTP"
          if [ "$HTTP" = "401" ]; then
            echo "::error::GPR_KEY не имеет доступа к TrustTunnel packages"
            exit 1
          fi

      - name: Configure Gradle credentials
        run: |
          mkdir -p ~/.gradle
          printf 'gpr.user=x\ngpr.key=%s\n' "${{ secrets.GPR_KEY }}" \
            >> ~/.gradle/gradle.properties

      - name: Flutter pub get
        env:
          GPR_KEY: ${{ secrets.GPR_KEY }}
        run: flutter pub get

      - name: Flutter pub get (vpn_plugin)
        run: |
          cd plugins/vpn_plugin
          flutter pub get

      - name: Generate Pigeon bindings
        run: |
          cd plugins/vpn_plugin
          dart run pigeon --input pigeons/platform_api.dart

      - name: Generate localizations
        env:
          GPR_KEY: ${{ secrets.GPR_KEY }}
        run: dart run intl_utils:generate

      - name: Run build_runner
        env:
          GPR_KEY: ${{ secrets.GPR_KEY }}
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK
        env:
          GPR_KEY: ${{ secrets.GPR_KEY }}
        run: |
          flutter build apk --release \
            --target-platform android-arm64 \
            --dart-define=BUILD_CHANNEL=Release \
            -P signingConfigKeyAlias=${{ secrets.KEY_ALIAS }} \
            -P signingConfigKeyPassword=${{ secrets.KEY_PASSWORD }} \
            -P signingConfigKeyStorePath=keystore.jks \
            -P signingConfigKeyStorePassword=${{ secrets.STORE_PASSWORD }}

      - name: Rename APK
        run: |
          VERSION=$(grep 'flutter.versionName' android/local.properties 2>/dev/null | cut -d= -f2 || echo "1.0.0")
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/TrustTunnel-${VERSION}-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrustTunnel-release
          path: build/app/outputs/flutter-apk/TrustTunnel-*-release.apk
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/TrustTunnel-*-release.apk
          generate_release_notes: true
