name: Build TrustTunnel APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.3'
          channel: stable
          cache: true

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks

      - name: Flutter pub get
        env:
          GPR_KEY: ${{ secrets.GPR_KEY }}
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Run build_runner
        env:
          GPR_KEY: ${{ secrets.GPR_KEY }}
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK
        env:
          GPR_KEY: ${{ secrets.GPR_KEY }}
        run: |
          flutter build apk --release \
            --dart-define=BUILD_CHANNEL=Release \
            -P signingConfigKeyAlias=${{ secrets.KEY_ALIAS }} \
            -P signingConfigKeyPassword=${{ secrets.KEY_PASSWORD }} \
            -P signingConfigKeyStorePath=keystore.jks \
            -P signingConfigKeyStorePassword=${{ secrets.STORE_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: trusttunnel-dark-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90
